# Kamailio TLS config (Stage A1 — baseline). Hardened in M11 (TLS 1.2+ only, cipher
# pinning, client-cert verification for trunks). Self-signed cert generated at first boot
# by entrypoint.sh; real ACME / private-CA material replaces it in M11.
[server:default]
method = TLSv1.2+
verify_certificate = no          # M11: set yes + ca_list for mutual TLS on trunks
require_certificate = no
private_key = /etc/kamailio/tls/edge-sbc.key
certificate = /etc/kamailio/tls/edge-sbc.crt

[client:default]
method = TLSv1.2+
verify_certificate = no          # M11: verify upstream trunk certs
require_certificate = no

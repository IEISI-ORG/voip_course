#!KAMAILIO
#
# SOVOC edge-sbc — Kamailio border config (Stage A1).
#
# Role: session border controller at the untrusted edge. Handles SIP signaling only;
# media is anchored by rtpengine (see rtpengine service). This config establishes the
# security posture the rest of the course builds on:
#   - UDP/TCP 5060 + TLS 5061 listeners            (TLS deepened in M10)
#   - sanity checks + scanner/UA blocking          (M13/M14)
#   - pike + ratelimit flood protection            (M8/M14, threat T8)
#   - topology hiding (topoh)                       (M7, hides internal core)
#   - NAT detection + rtpengine media anchoring     (M8/M11, threats T9)
#   - registrar (in-memory usrloc) + static route to core PBXs
#
# AUTHENTICATION IS A STUB HERE (accepts registrations) — full digest auth, TLS client
# certs, and STIR/SHAKEN arrive in M10/M12. Do not treat this as production-secure yet.

####### Defines #######
#!define WITH_TLS
#!substdef "!MY_IP_ADDR!172.28.10.10!g"
#!substdef "!PBX_A!172.28.20.21!g"
#!substdef "!PBX_B!172.28.20.22!g"
#!substdef "!RTPENGINE_SOCK!udp:172.28.20.11:2223!g"

####### Global Parameters #######
debug=2
log_stderror=yes          # container-friendly: logs to stdout/stderr
log_facility=LOG_LOCAL0

fork=yes
children=4

# Do not reveal server identity to scanners (threat T1).
server_header="Server: SBC"
user_agent_header="User-Agent: SBC"
sip_warning=no

auto_aliases=no

# Listen sockets: untrusted edge + trusted core.
listen=udp:MY_IP_ADDR:5060
listen=tcp:MY_IP_ADDR:5060
listen=udp:172.28.20.10:5060   # core-facing
#!ifdef WITH_TLS
enable_tls=yes
listen=tls:MY_IP_ADDR:5061
#!endif

tcp_connection_lifetime=3605

####### Modules #######
mpath="/usr/lib/x86_64-linux-gnu/kamailio/modules/"

loadmodule "tm.so"
loadmodule "tmx.so"
loadmodule "sl.so"
loadmodule "rr.so"
loadmodule "pv.so"
loadmodule "maxfwd.so"
loadmodule "textops.so"
loadmodule "siputils.so"
loadmodule "xlog.so"
loadmodule "sanity.so"
loadmodule "ctl.so"
loadmodule "kex.so"
loadmodule "corex.so"
loadmodule "usrloc.so"
loadmodule "registrar.so"
loadmodule "nathelper.so"
loadmodule "rtpengine.so"
loadmodule "pike.so"
loadmodule "htable.so"
loadmodule "topoh.so"
#!ifdef WITH_TLS
loadmodule "tls.so"
#!endif

####### Module params #######
# ----- registrar / usrloc (in-memory; DB-backed in M6/M12) -----
modparam("usrloc", "db_mode", 0)
modparam("registrar", "method_filtering", 1)
modparam("registrar", "max_contacts", 10)

# ----- rr / topology hiding -----
modparam("rr", "enable_full_lr", 1)
modparam("rr", "append_fromtag", 0)
# topoh masks internal Via/Contact/RR so the core topology never leaks to the edge.
modparam("topoh", "mask_key", "REPLACE_WITH_ENV_SECRET")   # sourced from .env at build
modparam("topoh", "mask_ip", "MY_IP_ADDR")

# ----- NAT / rtpengine -----
modparam("nathelper", "received_avp", "$avp(RECEIVED)")
modparam("rtpengine", "rtpengine_sock", "RTPENGINE_SOCK")

# ----- pike: per-source rate/flood detection (threat T8) -----
modparam("pike", "sampling_time_unit", 2)
modparam("pike", "reqs_density_per_unit", 30)
modparam("pike", "remove_latency", 120)

# ----- htable: transient blocklist for offenders -----
modparam("htable", "htable", "ipban=>size=10;autoexpire=300;")

#!ifdef WITH_TLS
modparam("tls", "config", "/etc/kamailio/tls.cfg")
#!endif

####### Routing Logic #######

request_route {
    # 1. Flood / blocklist gate — cheapest checks first.
    route(REQINIT);

    # 2. Handle retransmissions and in-dialog before anything expensive.
    if (!is_method("REGISTER") && from_uri==myself) {
        # request from a registered local user — allowed
    }

    if (has_totag()) {
        route(WITHINDLG);
        exit;
    }

    # 3. CANCEL / ACK.
    if (is_method("CANCEL")) {
        if (t_check_trans()) { t_relay(); }
        exit;
    }
    t_check_trans();

    # 4. Record-route dialog-forming requests.
    if (is_method("INVITE|SUBSCRIBE")) {
        record_route();
    }

    # 5. Registrations terminate here (stub auth — see M12).
    if (is_method("REGISTER")) {
        route(REGISTRAR);
        exit;
    }

    # 6. NAT + media anchoring, then route to core.
    route(NATDETECT);
    route(TORTP);
    route(RELAY);
}

# ---- Sanity, flood, and scanner filtering ----
route[REQINIT] {
    if (!mf_process_maxfwd_header("10")) {
        sl_send_reply("483", "Too Many Hops");
        exit;
    }
    if (!sanity_check("17895", "7")) {
        xlog("L_WARN", "malformed message from $si:$sp dropped\n");
        exit;                                # threat T10: drop malformed silently
    }

    # Persistent-offender blocklist.
    if ($sht(ipban=>$si)!=$null) {
        xlog("L_INFO", "banned source $si dropped\n");
        exit;
    }

    # pike flood detection -> ban source (threat T8).
    if (!pike_check_req()) {
        xlog("L_ALERT", "pike flood from $si — banning\n");
        $sht(ipban=>$si) = 1;
        exit;
    }

    # Block known scanner/UAC fingerprints (threat T1). Extended in M14.
    if ($ua =~ "(?i)(friendly-scanner|sipvicious|sipcli|sundayddr|VaxSIPUserAgent)") {
        xlog("L_NOTICE", "scanner UA '$ua' from $si banned\n");
        $sht(ipban=>$si) = 1;
        exit;
    }
}

route[WITHINDLG] {
    if (loose_route()) {
        route(TORTP);
        route(RELAY);
    } else {
        if (is_method("ACK")) {
            if (t_check_trans()) { t_relay(); }
            exit;
        }
        sl_send_reply("404", "Not Here");
    }
    exit;
}

# ---- Registrar (STUB AUTH) ----
route[REGISTRAR] {
    # TODO(M12): www_challenge()/auth_check() with digest SHA-256 + per-user secrets.
    #            For now accept and store the contact so call routing can be tested.
    fix_nated_register();
    if (!save("location")) {
        sl_reply_error();
    }
    xlog("L_INFO", "REGISTER stored for $tu from $si (STUB auth)\n");
    exit;
}

# ---- NAT detection ----
route[NATDETECT] {
    if (nat_uac_test("19")) {
        setflag(6);                          # mark far-end behind NAT
        fix_nated_contact();
    }
}

# ---- rtpengine media anchoring ----
route[TORTP] {
    if (is_method("INVITE") && !has_totag()) {
        rtpengine_manage("replace-origin replace-session-connection");
        t_on_reply("REPLY_RTP");
    } else if (is_method("BYE|CANCEL")) {
        rtpengine_delete();
    }
}

onreply_route[REPLY_RTP] {
    if (status=~"(183|2[0-9][0-9])" && sdp_content()) {
        rtpengine_manage("replace-origin replace-session-connection");
    }
}

# ---- Relay toward the trusted core ----
route[RELAY] {
    # Static routing to the primary PBX; policy routing (per-DID, failover) in M9.
    if (!has_totag()) {
        $du = "sip:PBX_A:5060";
    }
    if (!t_relay()) {
        sl_reply_error();
    }
    exit;
}

  #   static_configs: [{ targets: ["172.28.20.10:9494"] }]   # kamailio-exporter
  # - job_name: asterisk
  #   static_configs: [{ targets: ["172.28.20.21:9910"] }]   # res_prometheus
  # - job_name: node
  #   static_configs: [{ targets: ["edge-sbc:9100","pbx-a:9100","pbx-b:9100"] }]

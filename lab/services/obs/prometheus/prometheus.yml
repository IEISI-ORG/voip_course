# SOVOC observability — Prometheus scrape config (Stage A5).
# Scrapes itself now; VoIP exporters (Kamailio/Asterisk) are wired in M15 once the exporters
# are enabled on the core services. Targets are commented until then so scrapes don't error.
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    lab: sovoc

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # --- Enabled in M15 (uncomment once exporters are running) ---

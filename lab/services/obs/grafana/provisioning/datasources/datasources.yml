# SOVOC observability — Grafana datasource provisioning (Stage A5).
# Auto-wires Prometheus (metrics) and Loki (logs). HOMER has its own UI (homer-webapp);
# a Grafana HEP/SIP datasource is added in M15.
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100

[rtpengine]
# VoIPSec media relay (Stage A1). Userspace forwarding; SRTP bridging enabled in M11.
#
# Two named interfaces let the SBC steer media across the trust boundary:
#   external = edge  (untrusted side, faces clients/PSTN)
#   internal = core  (trusted side, faces the PBXs)
interface = internal/172.28.20.11;external/172.28.10.11

# NG control protocol — Kamailio's rtpengine module talks here (see kamailio.cfg
# RTPENGINE_SOCK = udp:172.28.20.11:2223).
listen-ng = 172.28.20.11:2223

# Media port range — deliberately small for a teaching lab (100 ports).
port-min = 30000
port-max = 30100

# Container-friendly logging.
foreground = true
log-stderr = true
log-level = 6

# No kernel forwarding table in a container (userspace only).
table = -1

# Redis disabled for the base lab (added with call-state persistence in M15/M16).
# redis = 127.0.0.1:6379/1

delete-delay = 0

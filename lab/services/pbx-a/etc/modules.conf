;; SOVOC pbx-a — module loading (Stage A2).
;; Autoload on, but explicitly refuse the legacy/insecure and unnecessary-surface modules.
[modules]
autoload = yes

; Legacy SIP stack — never load it; we use chan_pjsip exclusively.
noload = chan_sip.so
; MGCP / SCCP / unused channel drivers: reduce attack surface.
noload = chan_mgcp.so
noload = chan_skinny.so
noload = chan_unistim.so
; ARI/HTTP-dependent apps stay off until explicitly needed (see http.conf).
noload = res_ari.so
noload = res_ari_events.so

;; SOVOC pbx-a — dialplan (Stage A2).
;; Toll-fraud-safe by default (threat T4): there is NO outbound/PSTN route here. Outbound
;; trunk routing is added deliberately in M9 with dial restrictions and spend limits.

[globals]

[general]
static = yes
writeprotect = yes                ; no dialplan writes from AMI/CLI at runtime

;; Calls relayed in from the edge-sbc land here.
[from-edge]
exten = _1XXX,1,NoOp(inbound from edge-sbc to ${EXTEN})
 same = n,Dial(PJSIP/${EXTEN},30)
 same = n,Hangup()

;; Internal extensions + a couple of safe test targets.
[internal]
exten = _100X,1,NoOp(internal call to ${EXTEN})
 same = n,Dial(PJSIP/${EXTEN},30)
 same = n,Hangup()

; Echo test and playback for M4/M5 media labs — no external reach.
exten = 600,1,Answer()
 same = n,Playback(demo-echotest)
 same = n,Echo()
 same = n,Hangup()

exten = 601,1,Answer()
 same = n,Playback(hello-world)
 same = n,Hangup()

;; Anything not matched is rejected — no catch-all that could enable fraud.
exten = _X.,1,NoOp(BLOCKED unmatched dial ${EXTEN} from ${CALLERID(num)})
 same = n,Hangup(21)

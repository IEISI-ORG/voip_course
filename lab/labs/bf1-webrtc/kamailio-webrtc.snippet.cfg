## VoIPSec BF1 — Kamailio WebRTC (WSS) gateway snippet.
## Integrate into edge-sbc/kamailio.cfg: adds a Secure WebSocket transport so browsers (jsSIP/
## SIP.js) can register over wss://, and hands their media to rtpengine with WebRTC transforms.
## Requires the existing TLS setup (M11). Reference — merge, don't blind-paste.

#!ifdef WITH_WEBSOCKET
loadmodule "xhttp.so"
loadmodule "websocket.so"
# nathelper/rtpengine already loaded in the base config.

# WebSocket keepalive: ping clients so NAT bindings and the WS stay open.
modparam("websocket", "keepalive_mechanism", 1)   # ping
modparam("websocket", "keepalive_timeout", 30)
#!endif

## The browser connects to wss://<edge>:5061 (TLS transport from M11) and upgrades to WS.
## Handle the HTTP(S) upgrade in the xhttp event route:
event_route[xhttp:request] {
    set_reply_close();
    set_reply_no_connect();
    if ($hdr(Upgrade)=~"websocket" && $hdr(Connection)=~"Upgrade" && $rm=~"GET") {
        if (ws_handle_handshake()) { exit; }   # 101 Switching Protocols
    }
    xhttp_reply("403", "Forbidden", "text/plain", "no");
}


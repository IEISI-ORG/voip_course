# VoIPSec BF13 — hardened media Deployment: Multus dedicated interface (no hostNetwork) +
# Pod Security Standards "restricted". Passes pss-audit.sh.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: voipsec-media
  labels: { app: voipsec-media }
spec:
  replicas: 2
  selector: { matchLabels: { app: voipsec-media } }
  template:
    metadata:
      labels: { app: voipsec-media }
      annotations:
        # Multus: attach a dedicated media NIC so RTP's port range needs no hostNetwork.
        k8s.v1.cni.cncf.io/networks: voipsec-media-net
    spec:
      hostNetwork: false
      hostPID: false
      hostIPC: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: rtpengine
          image: rtpengine:pinned-tag
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ "ALL" ]
            seccompProfile: { type: RuntimeDefault }
          ports:
            - { containerPort: 30000, protocol: UDP }

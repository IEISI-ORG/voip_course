## SOVOC BF9 — Kamailio dual-stack (IPv4 + IPv6) listeners. Merge into edge-sbc/kamailio.cfg.
## Carrier/IMS networks are often IPv6-only, so the SBC must present both families and enforce
## IDENTICAL routing + security logic on each (pike, ACLs, topoh) — no v6 blind spot.

# Keep the existing v4 listeners AND add v6:
listen=udp:[2001:db8:5060::10]:5060
listen=tcp:[2001:db8:5060::10]:5060
#!ifdef WITH_TLS
listen=tls:[2001:db8:5060::10]:5061
#!endif

# Socket selection for outbound when multi-homed across families.
modparam("nathelper", "received_avp", "$avp(RECEIVED)")
# mhomed=1   # let the core pick the right source socket per destination family

## DNS: publish A + AAAA and NAPTR/SRV that resolve to both; RFC 3263 resolution then yields a
## v4 or v6 target (happy-eyeballs). Parser-harden v6 literals (RFC 5118).

## rtpengine IPv4<->IPv6 media bridge — give the interface both families so a v6 endpoint can
## talk to a v4 PBX (and vice versa), anchored at the border:
##   rtpengine.conf:  interface = internal/172.28.20.11;external/[2001:db8::11]
## and offer with `address-family=IP6` / `IP4` as needed in rtpengine_manage().

## SECURITY: the request_route logic (REQINIT sanity/pike/ban, topoh, auth) applies to BOTH
## families automatically because it is transport/family-agnostic — verify with a v6 scan that
## the same bans fire. The firewall is the usual gap: keep nftables ip6 at parity (parity-check.sh).

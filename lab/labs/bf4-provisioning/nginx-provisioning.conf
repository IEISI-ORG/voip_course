# VoIPSec BF4 — hardened auto-provisioning server (nginx). HTTPS + mutual TLS + MAC allowlist,
# and a device may fetch ONLY its own config. Replaces insecure TFTP/HTTP provisioning (T15/T11).

# Allowlist of device MACs (taken from the client-cert CN). Unknown => 0 => refused.
map $ssl_client_s_dn_cn $mac_allowed {
    default 0;
    "AABBCCDDEEFF" 1;
    "001122334455" 1;
}

server {
    listen 443 ssl;
    server_name prov.lab.voipsec.test;

    ssl_certificate     /etc/nginx/tls/server.crt;
    ssl_certificate_key /etc/nginx/tls/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # --- mutual TLS: require a client cert signed by our device CA ---
    ssl_client_certificate /etc/nginx/tls/device-ca.crt;
    ssl_verify_client      on;          # no client cert -> handshake refused
    ssl_verify_depth       2;

    root /srv/provisioning;

    # /provisioning/<MAC>.cfg — MAC must be allowlisted AND match the client cert CN.
    location ~ ^/provisioning/(?<mac>[A-Fa-f0-9]{12})\.cfg$ {
        if ($mac_allowed = 0)              { return 403; }   # unknown device
        if ($ssl_client_s_dn_cn != $mac)   { return 403; }   # can't fetch another device's config
        add_header Cache-Control "no-store";
        add_header X-Content-Type-Options "nosniff";
        try_files /$mac.cfg =404;
    }

    location / { return 403; }           # nothing else is servable
    server_tokens off;
}

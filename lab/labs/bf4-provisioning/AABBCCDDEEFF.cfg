# SOVOC BF4 — sample device provisioning config (MAC AABBCCDDEEFF). LAB ONLY.
# Real credentials come from a secure store / are injected server-side; never commit real secrets.
# This file is served only over mTLS to the device whose client-cert CN == its MAC, and it is
# signed (see sign-config.sh) so the phone rejects any tampered copy.
account.1.enable=1
account.1.label=Alice
account.1.userid=1001
account.1.authname=1001
account.1.password=__INJECTED_FROM_SECURE_STORE__
account.1.sip_server=edge-sbc.lab.sovoc.test
account.1.transport=TLS
account.1.srtp=required
provisioning.url=https://prov.lab.sovoc.test/provisioning/AABBCCDDEEFF.cfg
provisioning.mode=mtls
firmware.verify_signature=1

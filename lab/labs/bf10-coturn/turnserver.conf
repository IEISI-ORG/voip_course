# VoIPSec BF10 — hardened coturn config. Prevents open-relay abuse, SSRF, and amplification.
listening-port=3478
tls-listening-port=5349
listening-ip=172.28.10.11
realm=lab.voipsec.test

# --- Short-term REST credentials (no static passwords; leaked creds expire) ---
use-auth-secret
static-auth-secret=__FROM_ENV_TURN_SECRET__

# --- SSRF / relay fence: never relay toward internal, loopback, or link-local ---
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=::1
denied-peer-ip=fc00::-fdff:ffff:ffff:ffff:ffff:ffff:ffff:ffff
denied-peer-ip=fe80::-fe80::ffff:ffff:ffff:ffff

# --- Amplification / abuse caps ---
total-quota=100
user-quota=6
no-multicast-peers

# --- TLS ---
cert=/etc/coturn/tls/turn.crt
pkey=/etc/coturn/tls/turn.key

# --- Lock down the control surface ---
no-cli
fingerprint
stale-nonce
# no-tcp-relay        # enable if you only need UDP relay

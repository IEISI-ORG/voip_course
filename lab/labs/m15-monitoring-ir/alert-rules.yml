# SOVOC M15 — Prometheus alerting rules for VoIP security KPIs (Lab 15.1/15.2).
# Exprs assume the M15 exporters (kamailio-exporter, asterisk res_prometheus, blackbox/ssl,
# and a fraud/CDR gauge). Validate: promtool check rules alert-rules.yml
groups:
  - name: sovoc-voip-security
    rules:
      - alert: HighSIPFailureRatio
        expr: sum(rate(kamailio_sl_replies_total{code=~"4..|5.."}[5m])) / sum(rate(kamailio_sl_replies_total[5m])) > 0.5
        for: 5m
        labels: {severity: warning, threat: "T2/T10"}
        annotations:
          summary: "SIP failure ratio > 50% (scanning/enumeration or fault)"

      - alert: RegistrationFlood
        expr: sum(rate(kamailio_registrar_requests_total[1m])) > 50
        for: 2m
        labels: {severity: warning, threat: "T3/T8"}
        annotations:
          summary: "Registration rate spike (brute force / flood)"

      - alert: InviteFlood
        expr: sum(rate(kamailio_tm_received_replies_total[1m])) > 100 or sum(rate(asterisk_channels_total[1m])) > 100
        for: 1m
        labels: {severity: critical, threat: "T8"}
        annotations:
          summary: "INVITE/channel rate spike (DoS flood)"

      - alert: SourceBannedSpike
        expr: increase(kamailio_htable_entries{name="ipban"}[5m]) > 5
        for: 0m
        labels: {severity: warning, threat: "T1/T8"}
        annotations:
          summary: "Many sources banned in 5m (active scanning/flood)"

      - alert: CertExpiringSoon
        expr: probe_ssl_earliest_cert_expiry - time() < 30 * 86400
        for: 1h
        labels: {severity: warning, threat: "T6"}
        annotations:
          summary: "TLS cert expires in < 30 days"

      - alert: TollFraudSpend
        expr: sovoc_account_spend_usd > 20
        for: 0m
        labels: {severity: critical, threat: "T4"}
        annotations:
          summary: "Account spend over cap (possible IRSF) — auto-suspend + review"

      - alert: RecordingAccessAnomaly
        expr: increase(sovoc_recording_access_total{unauthorized="true"}[10m]) > 0
        for: 0m
        labels: {severity: critical, threat: "T14"}
        annotations:
          summary: "Unauthorized access to call recordings"

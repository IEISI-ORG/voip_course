## SOVOC BF3 — Kamailio HA: shared registrar state + registration replication.
## Integrate into edge-sbc/kamailio.cfg on BOTH replicas. Pick ONE sharing model (or combine):
##   (A) DB/Redis-backed usrloc — all replicas read/write one shared store.
##   (B) DMQ — replicas replicate their in-memory cache to each other.
## Every replica MUST carry identical security policy (TLS, ACLs, pike) — a failover to a weaker
## node is a silent security downgrade.

## ---- (A) shared store ----
loadmodule "db_redis.so"      # or db_mysql.so for MySQL
modparam("usrloc", "db_url", "redis://redis:6379/0")   # or "mysql://user:pass@db/kamailio"
modparam("usrloc", "db_mode", 3)   # 3 = DB-only: every node uses the shared store (no local cache drift)
modparam("usrloc", "use_domain", 0)

## ---- (B) DMQ cache replication (alternative / complement) ----
loadmodule "dmq.so"
loadmodule "dmq_usrloc.so"
modparam("dmq", "server_address", "sip:$SELF_CORE_IP:5060")
modparam("dmq", "notification_address", "sip:$PEER_CORE_IP:5060")   # the other replica
modparam("dmq_usrloc", "enable", 1)
modparam("dmq_usrloc", "sync", 1)

## ---- rtpengine media redundancy ----
## Give rtpengine a Redis backend so a standby can take over active call/media state:
##   rtpengine.conf:  redis = redis:6379/1
##                    redis-write = redis:6379/1
## A VIP/anycast in front of the two rtpengine instances lets media survive a node loss.

# VoIPSec reference lab — topology contract.
#
# This file defines the FULL segmented topology up front (networks + service slots).
# Services start as bootable placeholders (debian:stable-slim, idle) so learners can
# verify network segmentation in the M0 lab immediately. Each Stage-A build iteration
# replaces one placeholder with its real service (Kamailio, Asterisk, FreeSWITCH, ...).
#
# Segmentation invariant (enforced here, tested in M0/M8/M14):
#   - redteam containers attach ONLY to `edge` + `redteam` — never `core` or `mgmt`.
#   - `core` (trusted, mTLS) is reachable only through edge-sbc.
#   - `mgmt` carries observability; production would firewall it off from `edge`.
#
# Usage: `make up` / `make status` / `make down`. Override versions via `.env`.

name: voipsec-lab

networks:
  edge:      # untrusted border: external users, PSTN peers, attackers
    name: voipsec_edge
    ipam:
      config:
        - subnet: 172.28.10.0/24
  core:      # trusted internal: PBXs, reachable only via edge-sbc
    name: voipsec_core
    ipam:
      config:
        - subnet: 172.28.20.0/24
  mgmt:      # observability plane
    name: voipsec_mgmt
    ipam:
      config:
        - subnet: 172.28.30.0/24
  redteam:   # isolated offensive plane
    name: voipsec_redteam
    ipam:
      config:
        - subnet: 172.28.40.0/24

services:
  # ── Border ────────────────────────────────────────────────────────────────
  edge-sbc:            # Kamailio signaling border (Stage A1). Bridges edge↔core.
    build:
      context: ./services/edge-sbc
      args:
        KAMAILIO_TAG: ${KAMAILIO_TAG:-5.8-alpine}
    hostname: edge-sbc
    environment:
      # Pulled from the auto-loaded .env when present; safe defaults keep the lab bootable.
      SIP_DOMAIN: ${SIP_DOMAIN:-lab.voipsec.test}
      TOPOH_MASK_SECRET: ${TOPOH_MASK_SECRET:-}
    depends_on: [rtpengine]
    restart: unless-stopped
    networks:
      edge:
        ipv4_address: 172.28.10.10
      core:
        ipv4_address: 172.28.20.10

  rtpengine:           # Media relay / SRTP bridge (Stage A1). Anchors RTP at the border.
    build:
      context: ./services/rtpengine
      args:
        RTPENGINE_REF: ${RTPENGINE_REF:-mr12.5.1.1}
    hostname: rtpengine
    restart: unless-stopped
    networks:
      edge:
        ipv4_address: 172.28.10.11
      core:
        ipv4_address: 172.28.20.11

  # ── Trusted core ─────────────────────────────────────────────────────────
  pbx-a:               # Asterisk (Stage A2)
    build:
      context: ./services/pbx-a
    hostname: pbx-a
    environment:
      SIP_ALICE_SECRET: ${SIP_ALICE_SECRET:-}
      SIP_BOB_SECRET: ${SIP_BOB_SECRET:-}
    restart: unless-stopped
    networks:
      core:
        ipv4_address: 172.28.20.21

  pbx-b:               # FreeSWITCH (Stage A3)
    build:
      context: ./services/pbx-b
      args:
        FREESWITCH_IMAGE: ${FREESWITCH_IMAGE:-safarov/freeswitch:latest}
    hostname: pbx-b
    environment:
      FS_DEFAULT_PASSWORD: ${FS_DEFAULT_PASSWORD:-}
      FS_ESL_PASSWORD: ${FS_ESL_PASSWORD:-}
    restart: unless-stopped
    networks:
      core:
        ipv4_address: 172.28.20.22

  # ── External peers / users ─────────────────────────────────────────────────
  trunk-sim:           # SIPp PSTN peer (Stage A4) — external trunk on edge
    build:
      context: ./services/trunk-sim
    hostname: trunk-sim
    environment:
      TRUNK_IP: 172.28.10.30
      EDGE_SBC_IP: ${EDGE_SBC_IP:-172.28.10.10}
    restart: unless-stopped
    networks:
      edge:
        ipv4_address: 172.28.10.30

  client:              # Baresip + SIPp UACs (Stage A4) — external users
    build:
      context: ./services/client
    hostname: client
    environment:
      SIP_DOMAIN: ${SIP_DOMAIN:-lab.voipsec.test}
      EDGE_SBC_IP: ${EDGE_SBC_IP:-172.28.10.10}
      SIP_ALICE_SECRET: ${SIP_ALICE_SECRET:-}
    restart: unless-stopped
    networks:
      edge:
        ipv4_address: 172.28.10.40

  # ── Observability plane (Stage A5) ──────────────────────────────────────────
  # Heavy stack — gated behind the `obs` profile so base `make up` stays light.
  # Bring it up with `make obs-up` (docker compose --profile obs up -d).
  obs-db:              # Postgres backing HOMER
    image: postgres:16-alpine
    profiles: [obs]
    hostname: obs-db
    environment:
      POSTGRES_USER: ${HOMER_DB_USER:-homer}
      POSTGRES_PASSWORD: ${HOMER_DB_PASSWORD:-homer}
      POSTGRES_DB: ${HOMER_DB_NAME:-homer_data}
    volumes: [obs_pgdata:/var/lib/postgresql/data]
    restart: unless-stopped
    networks: { mgmt: { ipv4_address: 172.28.30.51 } }

  heplify-server:      # HEP collector → HOMER schema (receives mirrored SIP)
    image: sipcapture/heplify-server:latest
    profiles: [obs]
    hostname: heplify-server
    depends_on: [obs-db]
    environment:
      HEPLIFYSERVER_HEPADDR: "0.0.0.0:9060"
      HEPLIFYSERVER_DBSHEMA: homer7
      HEPLIFYSERVER_DBDRIVER: postgres
      HEPLIFYSERVER_DBADDR: "obs-db:5432"
      HEPLIFYSERVER_DBUSER: ${HOMER_DB_USER:-homer}
      HEPLIFYSERVER_DBPASS: ${HOMER_DB_PASSWORD:-homer}
      HEPLIFYSERVER_DBDATATABLE: homer_data
      HEPLIFYSERVER_DBCONFTABLE: homer_config
      HEPLIFYSERVER_DBROTATE: "true"
      HEPLIFYSERVER_LOGLVL: info
    restart: unless-stopped
    networks:
      mgmt: { ipv4_address: 172.28.30.52 }
      core: { ipv4_address: 172.28.20.52 }   # reachable by core services sending HEP

  homer-webapp:        # HOMER 7 UI
    image: sipcapture/webapp:latest
    profiles: [obs]
    hostname: homer-webapp
    depends_on: [obs-db, heplify-server]
    environment:
      DB_HOST: obs-db
      DB_USER: ${HOMER_DB_USER:-homer}
      DB_PASS: ${HOMER_DB_PASSWORD:-homer}
    restart: unless-stopped
    networks: { mgmt: { ipv4_address: 172.28.30.53 } }

  prometheus:          # metrics
    image: prom/prometheus:latest
    profiles: [obs]
    hostname: prometheus
    volumes:
      - ./services/obs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped
    networks:
      mgmt: { ipv4_address: 172.28.30.54 }
      core: { ipv4_address: 172.28.20.54 }   # scrape core exporters (M16)

  grafana:             # dashboards
    image: grafana/grafana:latest
    profiles: [obs]
    hostname: grafana
    depends_on: [prometheus, loki]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./services/obs/grafana/provisioning:/etc/grafana/provisioning:ro
      - obs_grafana:/var/lib/grafana
    restart: unless-stopped
    networks: { mgmt: { ipv4_address: 172.28.30.55 } }

  loki:                # log aggregation
    image: grafana/loki:latest
    profiles: [obs]
    hostname: loki
    command: ["-config.file=/etc/loki/loki-config.yml"]
    volumes:
      - ./services/obs/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - obs_loki:/loki
    restart: unless-stopped
    networks: { mgmt: { ipv4_address: 172.28.30.56 } }

  wazuh:               # SIEM (single-node manager; full indexer+dashboard in M16)
    image: wazuh/wazuh-manager:latest
    profiles: [obs]
    hostname: wazuh
    restart: unless-stopped
    networks: { mgmt: { ipv4_address: 172.28.30.57 } }

  # ── Offensive plane (authorized lab use ONLY) ───────────────────────────────
  redteam:             # SIPVicious OSS + sipp fuzzers (Stage A6) — AUTHORIZED LAB USE ONLY
    build:
      context: ./services/redteam
    hostname: redteam
    restart: unless-stopped
    # Intentionally attached to edge + redteam ONLY — never core/mgmt (ethical fence).
    networks:
      edge:
        ipv4_address: 172.28.10.90
      redteam:
        ipv4_address: 172.28.40.90

volumes:
  obs_pgdata:
  obs_grafana:
  obs_loki:
